<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REPERTÓRIO IBB | Netflix Style</title>
    <!-- PWA & Mobile Optimization -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Repertório IBB">
    <link rel="apple-touch-icon" href="hero_banner.png">
    <meta name="theme-color" content="#141414">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header id="header">
        <div class="logo">REPERTÓRIO IBB</div>
        <div class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></div>
        <nav id="navbar">
            <ul>
                <li><a href="#" id="homeNav" class="active">Página Inicial</a></li>
                <li><a href="#" id="categoriesNav">Categorias</a></li>
                <li><a href="#" id="newNav">Novos</a></li>
                <li><button id="addSongBtn" class="add-btn-main"><i class="fas fa-plus"></i> Adicionar</button></li>
            </ul>
        </nav>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Músicas ou artistas...">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <main>
        <!-- Category Filter Overlay -->
        <div id="categoryOverlay" class="category-overlay">
            <div id="categoryList" class="category-list"></div>
        </div>

        <!-- Add Song Modal -->
        <div id="addSongModal" class="modal">
            <div class="modal-content">
                <span class="close-add-modal">&times;</span>
                <div class="modal-info">
                    <h2>Adicionar Novo Louvor</h2>
                    <p>Preencha os dados abaixo para cadastrar na base local.</p>
                    <form id="addSongForm" class="add-song-form">
                        <input type="text" id="addTitle" placeholder="Nome do Louvor" required>
                        <input type="text" id="addArtist" placeholder="Artista/Ministério" required>
                        <input type="url" id="addUrl" placeholder="URL do YouTube (Livre para busca se vazio)">
                        
                        <div class="category-selection">
                            <label>Selecione as Categorias:</label>
                            <div id="categoryCheckboxes" class="checkbox-grid">
                                <!-- Categorias injetadas aqui -->
                            </div>
                        </div>
                        
                        <button type="submit" class="save-btn-large">Salvar Louvor</button>
                    </form>
                </div>
            </div>
        </div>

        <section class="hero" id="hero">
            <div class="hero-content">
                <h1 id="heroTitle">Repertório IBB</h1>
                <p id="heroInfo">Louvor e Adoração • 2024</p>
                <div class="buttons">
                    <button class="play-btn" onclick="openHeroVideo()"><i class="fas fa-play"></i> Assistir</button>
                    <button class="info-btn"><i class="fas fa-info-circle"></i> Mais Informações</button>
                </div>
            </div>
            <div class="hero-overlay"></div>
        </section>

        <!-- Search Results Grid -->
        <div id="searchResults" class="search-results-grid"></div>

        <div id="categoriesContainer">
            <!-- As categorias serão injetadas aqui via JS -->
        </div>
    </main>

    <footer>
        <p>&copy; 2024 IBB Louvor - Desenvolvido por <span class="developer-name">Jhony Berado</span></p>
    </footer>

    <!-- Video Modal -->
    <div id="videoModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="video-wrapper">
                <iframe id="videoIframe" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="modal-info">
                <h2 id="modalTitle"></h2>
                <p id="modalArtist"></p>
                <div class="modal-actions">
                    <button id="editUrlBtn" title="Editar URL do vídeo"><i class="fas fa-edit"></i> Editar Versão</button>
                </div>
                <!-- Inline URL Editor (substitui o prompt) -->
                <div id="urlEditorPanel" class="url-editor-panel" style="display:none;">
                    <p>Cole o novo link do YouTube abaixo:</p>
                    <input type="url" id="newUrlInput" placeholder="https://www.youtube.com/watch?v=..." />
                    <div class="url-editor-actions">
                        <button id="saveUrlBtn" class="save-url-btn"><i class="fas fa-save"></i> Salvar</button>
                        <button id="cancelUrlBtn" class="cancel-url-btn"><i class="fas fa-times"></i> Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
